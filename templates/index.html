<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Rift Insights</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Rift Insights </h1>

    <form method="POST">
        <input 
            type="text" 
            name="riot_id" 
            placeholder="Digite seu Riot ID (ex: Hide on bush#KR1)"
            required
        >
        <button type="submit">Buscar</button>
    </form>

    {% if puuid %}
        <div class="result success">
            <h2>PUUID encontrado:</h2>
            <p>{{ puuid }}</p>
        </div>
    {% endif %}

    {% if error %}
        <div class="result error">
            <p>{{ error }}</p>
        </div>
    {% endif %}
</div>

</body>
</html>
